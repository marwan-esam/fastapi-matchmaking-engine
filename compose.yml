services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: match_user
      POSTGRES_PASSWORD: strictpassword
      POSTGRES_DB: matchmaking_db
    volumes:
      - pg_match_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U match_user -d matchmaking_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/code
      - /code/venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pg_match_data: